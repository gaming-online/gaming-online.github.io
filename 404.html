<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404: Page not found</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&family=Outfit:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --bg: #0b0514;
            --accent: #8a2be2;
            --accent-glow: rgba(138, 43, 226, 0.5);
            --text: #ffffff;
            --text-dim: #a096b1;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg);
            color: var(--text);
            font-family: 'Inter', sans-serif;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            /* Matches your purple dark theme */
            background: radial-gradient(circle at center, #1a0b2e 0%, #0b0514 100%);
        }

        .error-container {
            text-align: center;
            animation: fadeIn 0.8s ease-out;
            padding: 20px;
        }

        .glitch-wrapper {
            position: relative;
            display: inline-block;
        }

        .error-code {
            font-family: 'Outfit', sans-serif;
            font-size: 10rem;
            line-height: 1;
            color: var(--accent);
            text-shadow: 0 0 30px var(--accent-glow);
            margin-bottom: 1rem;
            letter-spacing: -5px;
        }

        .error-msg {
            font-family: 'Outfit', sans-serif;
            font-size: 1.5rem;
            color: var(--text);
            margin-bottom: 2rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .description {
            color: var(--text-dim);
            max-width: 400px;
            margin: 0 auto 2.5rem auto;
            line-height: 1.6;
        }

        .home-btn {
            display: inline-flex;
            align-items: center;
            gap: 10px;
            background: var(--accent);
            color: white;
            text-decoration: none;
            padding: 15px 35px;
            border-radius: 50px;
            font-weight: 600;
            font-family: 'Outfit', sans-serif;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.3);
        }

        .home-btn:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 30px var(--accent-glow);
            background: #9d42f5;
        }

        .home-btn i {
            font-size: 0.9rem;
            transition: transform 0.3s;
        }

        .home-btn:hover i {
            transform: translateX(-5px);
        }

        /* Ambient background floaters */
        .orb {
            position: absolute;
            width: 300px;
            height: 300px;
            background: var(--accent);
            filter: blur(150px);
            opacity: 0.15;
            z-index: -1;
            border-radius: 50%;
            animation: float 10s infinite alternate;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.95); }
            to { opacity: 1; transform: scale(1); }
        }

        @keyframes float {
            from { transform: translate(-20%, -20%); }
            to { transform: translate(20%, 20%); }
        }

        @media (max-width: 600px) {
            .error-code { font-size: 6rem; }
            .error-msg { font-size: 1.2rem; }
        }
    </style>
</head>
<body>

    <div class="orb"></div>

    <div class="error-container">
        <div class="glitch-wrapper">
            <h1 class="error-code">404</h1>
        </div>
        <h2 class="error-msg">Page not found</h2>
        <p class="description">
            Check if the path you entered is correct.
        </p>
        
        <a href="index.html" class="home-btn">
            <i class="fas fa-arrow-left"></i> Return to Hub
        </a>
    </div>

</body>
</html>
