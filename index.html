<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Gaming.Online | Portal</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <nav class="navbar">
        <a href="index.html" class="nav-link active"><i data-lucide="home"></i> Home</a>
        <a href="games" class="nav-link"><i data-lucide="gamepad-2"></i> Games</a>
        <a href="ai" class="nav-link"><i data-lucide="sparkles"></i> AI</a>
        <a href="community" class="nav-link"><i data-lucide="hash"></i> Community</a>
    </nav>

    <main class="container" style="height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; text-align: center;">
        <div style="margin-bottom: 30px;">
            <h1 style="font-family: 'Syncopate', sans-serif; font-size: 5rem; text-transform: uppercase; margin: 0; letter-spacing: -5px;">
                GAMING<span style="color: var(--purple-glow);">.</span>ONLINE
            </h1>
            <p style="font-size: 1.2rem; color: #71717a; letter-spacing: 2px;">UNRESTRICTED ACCESS // VERSION 2.0</p>
        </div>

        <div style="display: flex; gap: 20px;">
            <button class="btn-main" onclick="location.href='games'">
                INITIALIZE GAMES <i data-lucide="play"></i>
            </button>
        </div>
    </main>

    <div style="position: fixed; bottom: 20px; right: 20px; font-size: 0.7rem; color: #3f3f46; text-transform: uppercase; letter-spacing: 1px;">
        Shift+P: Panic // Shift+L: Stealth
    </div>

    <script src="main.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
