<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Vault | Gaming.Online</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>

    <nav class="navbar">
        <a href="../" class="nav-link"><i data-lucide="arrow-left"></i> Return</a>
        <div style="width: 1px; height: 20px; background: var(--border);"></div>
        <div style="display: flex; align-items: center; gap: 10px; color: #a1a1aa;">
            <i data-lucide="search" style="width: 18px;"></i>
            <input type="text" id="gameSearch" placeholder="Search Vault..." 
                   style="background: transparent; border: none; color: white; outline: none; font-family: inherit;">
        </div>
    </nav>

    <div class="container" style="padding-top: 120px;">
        <div id="gameGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 30px;">
            <div class="game-card">
                <img src="../assets/game-thumbnail.png" alt="Game">
                <div class="game-info">
                    <h2 style="margin: 0; font-size: 1.5rem;">Game Title</h2>
                    <div style="display: flex; gap: 8px; margin-top: 10px;">
                        <span style="background: var(--purple-glow); padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold;">RPG</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="../main.js"></script>
    <script>
        // Placeholder for loading your games.json
        async function fetchGames() {
            const res = await fetch('../assets/games.json');
            const data = await res.json();
            const grid = document.getElementById('gameGrid');
            grid.innerHTML = data.map(game => `
                <div class="game-card" onclick="location.href='game?id=${game.title}'">
                    <img src="${game.thumbnail}" alt="${game.title}">
                    <div class="game-info">
                        <h2 style="margin: 0; font-size: 1.5rem;">${game.title}</h2>
                        <div style="display: flex; gap: 8px; margin-top: 10px;">
                            ${game.tags.map(t => `<span style="background: var(--purple-glow); padding: 4px 10px; border-radius: 6px; font-size: 0.7rem; font-weight: bold;">${t}</span>`).join('')}
                        </div>
                    </div>
                </div>
            `).join('');
            lucide.createIcons();
        }
        fetchGames();
    </script>
</body>
</html>
