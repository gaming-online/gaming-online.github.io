<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Games | Gaming.Online</title>
    <link rel="stylesheet" href="../style.css">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body>
    <div class="container">
        <header class="animate-in" style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 60px;">
            <a href="../" class="btn-main" style="padding: 8px 16px;"><i data-lucide="chevron-left"></i> Home</a>
            <div style="position: relative;">
                <i data-lucide="search" style="position: absolute; left: 12px; top: 10px; color: var(--text-dim); width: 18px;"></i>
                <input type="text" id="gameSearch" placeholder="Find a game..." 
                       style="background: var(--bg-card); border: 1px solid #222; color: white; padding: 10px 15px 10px 40px; border-radius: 10px; width: 300px; outline: none; transition: var(--transition);">
            </div>
        </header>

        <div id="gameGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(260px, 1fr)); gap: 25px;">
            <div class="game-card animate-in" style="background: var(--bg-card); border-radius: 16px; overflow: hidden; border: 1px solid #1a1a2e; transition: var(--transition); cursor: pointer;">
                <div style="height: 160px; background: #1a1a2e; overflow: hidden;">
                    <img src="../assets/game-thumbnail.png" style="width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s;">
                </div>
                <div style="padding: 20px;">
                    <h3 style="margin-bottom: 8px;">Game Title</h3>
                    <div style="display: flex; gap: 5px; flex-wrap: wrap;">
                        <span style="background: rgba(124, 58, 237, 0.2); color: var(--purple-light); font-size: 0.7rem; padding: 3px 8px; border-radius: 5px;">Action</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <style>
        .game-card:hover {
            transform: translateY(-8px);
            border-color: var(--purple-primary);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5), 0 0 20px rgba(124, 58, 237, 0.1);
        }
        .game-card:hover img { transform: scale(1.1); }
        input:focus { border-color: var(--purple-primary) !important; box-shadow: 0 0 15px rgba(124, 58, 237, 0.2); }
    </style>

    <script src="../main.js"></script>
    <script>lucide.createIcons();</script>
</body>
</html>
