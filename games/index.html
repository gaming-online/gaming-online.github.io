<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Games | Gaming.Online</title>
    <link rel="stylesheet" href="../style.css">
</head>
<body>
    <div class="container">
        <header style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 40px;">
            <a href="../" style="color: white; text-decoration: none;">← Back</a>
            <input type="text" id="gameSearch" placeholder="Search games..." style="padding: 10px; border-radius: 5px; border: none; width: 300px;">
        </header>

        <div id="favoritesSection" style="margin-bottom: 40px; display: none;">
            <h2 style="text-align: left;">Pinned Games</h2>
            <div id="favoritesGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;"></div>
            <hr style="border: 0.5px solid #222; margin-top: 40px;">
        </div>

        <div id="gameGrid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px;">
            </div>
    </div>

    <script>
        async function loadGames() {
            const response = await fetch('../assets/games.json');
            const games = await response.json();
            const grid = document.getElementById('gameGrid');

            games.forEach(game => {
                const card = document.createElement('div');
                card.className = 'game-card';
                card.style = "background: var(--bg-accent); padding: 15px; border-radius: 12px; cursor: pointer;";
                card.innerHTML = `
                    <img src="${game.thumbnail}" style="width: 100%; border-radius: 8px;">
                    <h3 style="margin: 10px 0 5px 0;">${game.title}</h3>
                    <div class="tags">
                        ${game.tags.map(tag => `<span style="font-size: 0.7rem; background: var(--purple-main); padding: 2px 6px; border-radius: 4px; margin-right: 5px;">${tag}</span>`).join('')}
                    </div>
                `;
                card.onclick = () => window.location.href = `game?id=${encodeURIComponent(game.title)}`;
                grid.appendChild(card);
            });
        }
        loadGames();
    </script>
    <script src="../main.js"></script>
</body>
</html>
