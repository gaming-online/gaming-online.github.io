<div class="player-container" style="display: flex; flex-direction: column; height: 100vh;">
    <div class="toolbar" style="padding: 10px; background: #111; display: flex; gap: 10px;">
        <button onclick="location.href='../games'">Back</button>
        <button onclick="toggleFullscreen()">Fullscreen</button>
        <button onclick="shareGame()">Share</button>
    </div>

    <div class="main-layout" style="display: flex; flex: 1;">
        <div id="left-sidebar" class="sidebar"></div>
        
        <div class="game-window" style="flex: 2;">
            <iframe id="game-frame" src="" frameborder="0" style="width: 100%; height: 100%;"></iframe>
        </div>

        <div id="right-sidebar" class="sidebar"></div>
    </div>
</div>

<script>
    function toggleFullscreen() {
        const elem = document.getElementById("game-frame");
        if (elem.requestFullscreen) elem.requestFullscreen();
    }
    // Logic to populate sidebars based on tags would go here
</script>
